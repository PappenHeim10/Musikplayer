<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Musik Konsole</title>
</head>
<body>
    <main class="console">
        <!-- Kopf: Bibliothek + Ordnerwahl -->
        <header class="console__head">
            <div class="brand">
                <p class="brand__eyebrow">Lokale Bibliothek</p>
                <h1 class="brand__title">Musik Konsole</h1>
            </div>
            <button id="openFolderButton" class="btn btn--ghost" type="button">Ordner wählen</button>
        </header>

        <!-- Trackliste -->
        <section class="tracklist" id="songList" aria-label="Titelliste">
            <p id="leereSongListe" class="tracklist__empty">Lade Songliste…</p>
            <ul class="tracklist__items"></ul>
        </section>

        <p id="errorMessage" class="alert" role="alert"></p>

        <!-- Transportleiste -->
        <footer class="transport">
            <div class="transport__meta">
                <div class="eq" id="eqBars" aria-hidden="true">
                    <span></span><span></span><span></span><span></span>
                </div>
                <span id="nowPlaying" class="transport__title">Nichts ausgewählt</span>
            </div>

            <div class="seek">
                <span id="currentTime" class="readout">0:00</span>
                <input type="range" id="progressBar" class="meter" value="0" step="0.1" aria-label="Wiedergabeposition">
                <span id="duration" class="readout readout--dim">0:00</span>
            </div>

            <div class="transport__controls">
                <div class="controls">
                    <button id="prevButton" class="btn btn--icon" type="button" aria-label="Vorheriger Titel">⏮</button>
                    <button id="playButton" class="btn btn--icon btn--play" type="button" aria-label="Abspielen">▶</button>
                    <button id="nextButton" class="btn btn--icon" type="button" aria-label="Nächster Titel">⏭</button>
                    <button id="stopTrackButton" class="btn btn--icon" type="button" aria-label="Stopp">⏹</button>
                </div>

                <label class="volume">
                    <span class="volume__icon" aria-hidden="true">🔊</span>
                    <input type="range" id="volumeControl" class="meter meter--volume" min="0" max="1" step="0.05" value="0.5" aria-label="Lautstärke">
                </label>
            </div>
        </footer>

        <p class="hint">Leertaste Play/Pause · ← → Titel · ↑ ↓ Lautstärke</p>
    </main>

    <!-- Reihenfolge wichtig: utils → ui → player → main -->
    <script src="utils.js"></script>
    <script src="ui.js"></script>
    <script src="player.js"></script>
    <script src="main.js"></script>
</body>
</html>
